apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
        - name: ledger-service
          image: {{ .Values.microservices.ledger.image }}
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/ledger_db?sslmode=disable"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
            - name: PORT
              value: "3002"
          ports:
            - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
spec:
  selector:
    app: ledger-service
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
