apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
        - name: payment-processor
          image: {{ .Values.microservices.payment.image }}
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/payments_db?sslmode=disable"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
            - name: PORT
              value: "3001"
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
spec:
  selector:
    app: payment-processor
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
